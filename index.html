<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GYMTRACKER V02">
    <meta name="theme-color" content="#0e0e0e">
    <title>GYMTRACKER V02 - GymTracker</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#cafd00",
                        "primary-container": "#f3ffca",
                        "on-primary": "#0e0e0e",
                        "on-primary-container": "#3a4a00",
                        "surface": "#0e0e0e",
                        "surface-container-low": "#131313",
                        "surface-container-lowest": "#0a0a0a",
                        "surface-container": "#1a1a1a",
                        "surface-container-high": "#222222",
                        "surface-container-highest": "#2c2c2c",
                        "surface-bright": "#2c2c2c",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#a09c9b",
                        "secondary": "#e5e2e1",
                        "secondary-container": "#333333",
                        "tertiary": "#00e3fd",
                        "tertiary-container": "#81ecff",
                        "outline": "#525151",
                        "outline-variant": "rgba(82,81,81,0.15)",
                        "inverse-surface": "#e5e2e1",
                        "inverse-on-surface": "#0e0e0e",
                        "error": "#ff5449",
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"],
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "md": "0.375rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                }
            }
        }
    </script>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-surface text-on-surface">
    <div id="app">

        <!-- WELCOME -->
        <div id="screen-welcome" class="screen active">
            <div class="relative" style="height:55%;">
                <div class="absolute inset-0 z-10" style="background:linear-gradient(to bottom,rgba(14,14,14,0.3),rgba(14,14,14,0.9));"></div>
                <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuCa_52pk7L12j25kMDB1e6TrHjrIyhhyWUorB2S7W1RIFc4_W2HS-zI9mCxIaapACF_cWDiF9ihJNhhctbyO_fuRwRzPS1ZUBe3QsP9AaOKK2eCzKo6pQ5b0u52l4FN_8vi5sub2jU1pVRPKg4_tsDSzhcfi2iFLblW67HGbDE9Kd8E_B1HB4-E2l8L9QY64eUk0QU-4X5X6dMnaOZeOTXIdD19FkHLJ6f1xlRoChzw8XfP2dTLwFSf0XS7qGtpn_iaiWyIVAK4ig" alt="Gym" style="width:100%;height:100%;object-fit:cover;">
                <div class="absolute top-8 left-8 z-20"><div class="text-2xl font-black tracking-tighter text-primary font-headline">GYMTRACKER V02</div></div>
                <div class="absolute bottom-8 left-8 right-8 z-20">
                    <h1 class="text-4xl font-headline font-bold text-white leading-tight tracking-tight">Eleva Tu <br><span class="text-primary">Rendimiento.</span></h1>
                    <p class="text-white/60 text-sm mt-3 font-body" id="w-subtitle">Entrena inteligentemente, progresa constantemente</p>
                </div>
            </div>
            <div style="flex:1;padding:24px;display:flex;flex-direction:column;justify-content:center;background:#0e0e0e;">
                <button onclick="loginWithGoogle()" class="google-btn mb-5">
                    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                    <span id="google-btn-text">Regístrate con Google</span>
                </button>
                <div class="flex gap-3">
                    <button onclick="setLang('es')" id="lang-es" style="flex:1;padding:12px;border-radius:9999px;font-weight:700;font-size:13px;cursor:pointer;border:none;background:#cafd00;color:#0e0e0e;font-family:'Manrope',sans-serif;letter-spacing:0.05em;text-transform:uppercase;">Español</button>
                    <button onclick="setLang('it')" id="lang-it" style="flex:1;padding:12px;border-radius:9999px;font-weight:700;font-size:13px;cursor:pointer;border:none;background:#222222;color:#e5e2e1;font-family:'Manrope',sans-serif;letter-spacing:0.05em;text-transform:uppercase;">Italiano</button>
                </div>
            </div>
        </div>

        <!-- ONBOARDING -->
        <div id="screen-onboarding" class="screen" style="background:#131313;">
            <div style="padding:20px 24px 0;">
                <div class="flex justify-between items-center mb-3">
                    <button onclick="prevStep()" id="ob-back-btn" style="background:none;border:none;cursor:pointer;padding:8px;margin:-8px;visibility:hidden;"><span class="material-symbols-outlined" style="color:#e5e2e1;">arrow_back</span></button>
                    <div class="text-lg font-bold tracking-tighter text-primary font-headline">GYMTRACKER V02</div>
                    <span class="text-xs text-on-surface-variant font-label font-bold tracking-widest uppercase" id="ob-step-label">1/6</span>
                </div>
                <div class="intensity-bar"><div id="ob-progress" class="intensity-fill" style="width:16.6%;transition:width 0.3s;"></div></div>
            </div>
            <div style="flex:1;overflow-y:auto;padding:28px 24px;" id="ob-content"></div>
            <div style="padding:16px 24px 28px;">
                <button onclick="nextStep()" id="ob-next-btn" class="cta-primary">Siguiente</button>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="screen-dashboard" class="screen" style="background:#0e0e0e;padding-bottom:80px;">
            <header class="sticky top-0 z-10" style="background:rgba(14,14,14,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:16px 24px;">
                <div class="text-xl font-bold tracking-tighter text-primary font-headline">GYMTRACKER V02</div>
            </header>
            <div style="padding:8px 24px 24px;" id="dash-content"></div>
        </div>

        <!-- TRAINING -->
        <div id="screen-training" class="screen" style="background:#0e0e0e;padding-bottom:80px;overflow-y:auto;">
            <div style="padding:16px 20px;" id="train-content"></div>
        </div>

        <!-- PROGRESS -->
        <div id="screen-progress" class="screen" style="background:#0e0e0e;padding-bottom:80px;">
            <header class="sticky top-0 z-10" style="background:rgba(14,14,14,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:16px 24px;">
                <div class="text-xl font-bold tracking-tighter text-primary font-headline">GYMTRACKER V02</div>
            </header>
            <div style="padding:0 24px 24px;">
                <span class="text-primary font-headline font-bold tracking-widest uppercase text-xs mb-2 block" id="prog-label-top">Estadísticas</span>
                <h2 class="text-4xl font-headline font-bold tracking-tighter text-on-surface leading-[0.95] mb-8" id="prog-title">Tu<br>Evolución</h2>
                <div id="prog-content"></div>
            </div>
        </div>

        <!-- PROFILE -->
        <div id="screen-profile" class="screen" style="background:#0e0e0e;padding-bottom:80px;">
            <header class="sticky top-0 z-10" style="background:rgba(14,14,14,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:16px 24px;">
                <div class="text-xl font-bold tracking-tighter text-primary font-headline">GYMTRACKER V02</div>
            </header>
            <div style="padding:0 24px 24px;" id="prof-content"></div>
        </div>

        <!-- BOTTOM NAV -->
        <div id="bottom-nav" class="bottom-nav" style="display:none;background:rgba(14,14,14,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:8px 0 env(safe-area-inset-bottom);">
            <div class="flex justify-around">
                <div class="nav-item active" onclick="goTo('dashboard')" id="nav-dashboard"><span class="material-symbols-outlined">home</span><span id="nav-t-dash">Home</span></div>
                <div class="nav-item" onclick="goTo('training')" id="nav-training"><span class="material-symbols-outlined">fitness_center</span><span id="nav-t-train">Entreno</span></div>
                <div class="nav-item" onclick="goTo('progress')" id="nav-progress"><span class="material-symbols-outlined">trending_up</span><span id="nav-t-prog">Progreso</span></div>
                <div class="nav-item" onclick="goTo('profile')" id="nav-profile"><span class="material-symbols-outlined">person</span><span id="nav-t-prof">Perfil</span></div>
            </div>
        </div>

        <!-- WHATSAPP FAB -->
        <a id="whatsapp-fab" class="whatsapp-fab" href="https://wa.me/3440114712" target="_blank" rel="noopener" style="display:none;">
            <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        </a>

        <!-- MODAL -->
        <div id="modal" class="modal-overlay">
            <div class="modal-box">
                <h2 class="font-headline text-lg font-bold text-on-surface mb-2" id="modal-title"></h2>
                <p class="text-on-surface-variant text-sm mb-6" id="modal-text"></p>
                <div class="flex gap-3">
                    <button onclick="closeModal()" class="cta-secondary">Cancelar</button>
                    <button onclick="confirmModal()" style="flex:1;padding:12px;border:none;border-radius:9999px;background:#ff5449;color:white;font-weight:600;cursor:pointer;font-family:'Manrope',sans-serif;">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Files (order matters!) -->
    <script src="js/data.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/onboarding.js"></script>
    <script src="js/training.js"></script>
    <script src="js/screens.js"></script>
</body>
</html>
